version: "3"
services:
  ################################################
  # Apache + PHP8 (rewrite)
  web:
    container_name: brilho-backend
    build: ./.docker/php
    restart: always
    volumes:
      - ./:/var/www/html:delegated
    ports:
      - ${DOCKER_APACHE_PORT}:80
    env_file: .env
    environment:
      APACHE_RUN_USER: "#1000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
  ################################################
  # MySQL - Server
  db:
    container_name: brilho-database
    image: mysql:8.3
    volumes:
      - ./.docker/data/db:/var/lib/mysql:delegated
      - ./.docker/db:/docker-entrypoint-initdb.d
      - ./.docker/db:/etc/mysql/conf.d
    environment:
      - MYSQL_ROOT_PASSWORD=plane
    ports:
      - ${DOCKER_MYSQL_PORT}:3306
    command: mysqld --sql_mode=""
